<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Plan Recommendation Quiz</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e334d;
      --accent: #6c63ff;
      --accent-light: #a89ff5;
      --text: #e8eaf6;
      --text-muted: #8b90b0;
      --radius: 12px;
      --radius-sm: 8px;
      --free-color: #60a5fa;
      --pro-color: #a78bfa;
      --team-color: #f472b6;
      --api-color: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 640px;
    }
    .badge {
      display: inline-block;
      background: rgba(108,99,255,0.15);
      color: var(--accent-light);
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 36px; line-height: 1.5; }
    .progress-bar-wrap {
      background: var(--surface2);
      border-radius: 4px;
      height: 4px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .question-block { display: none; }
    .question-block.active { display: block; }
    .q-number { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
    .q-text { font-size: 20px; font-weight: 600; margin-bottom: 24px; line-height: 1.4; }
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      cursor: pointer;
      font-size: 15px;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option:hover { border-color: var(--accent); background: rgba(108,99,255,0.08); }
    .option.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); }
    .option .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .option.selected .dot { background: var(--accent); border-color: var(--accent); }
    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; gap: 12px; }
    .btn {
      padding: 12px 28px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:disabled { opacity: 0.3; cursor: default; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
    .result { display: none; }
    .result.visible { display: block; }
    .plan-card {
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      border: 2px solid;
    }
    .plan-card.free  { background: rgba(96,165,250,0.08);  border-color: rgba(96,165,250,0.4);  }
    .plan-card.pro   { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.4); }
    .plan-card.team  { background: rgba(244,114,182,0.08); border-color: rgba(244,114,182,0.4); }
    .plan-card.api   { background: rgba(52,211,153,0.08);  border-color: rgba(52,211,153,0.4);  }
    .plan-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .plan-card.free  .plan-label { color: var(--free-color); }
    .plan-card.pro   .plan-label { color: var(--pro-color); }
    .plan-card.team  .plan-label { color: var(--team-color); }
    .plan-card.api   .plan-label { color: var(--api-color); }
    .plan-name { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
    .plan-reason { font-size: 15px; color: var(--text-muted); line-height: 1.6; }
    .plan-features { list-style: none; margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
    .plan-features li { font-size: 14px; color: var(--text-muted); display: flex; gap: 8px; }
    .plan-features li::before { content: "✓"; font-weight: 700; }
    .plan-card.free  .plan-features li::before { color: var(--free-color); }
    .plan-card.pro   .plan-features li::before { color: var(--pro-color); }
    .plan-card.team  .plan-features li::before { color: var(--team-color); }
    .plan-card.api   .plan-features li::before { color: var(--api-color); }
    .retake-btn { width: 100%; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Decision Quiz</div>
    <h1>Which Claude Plan Is Right for You?</h1>
    <p class="subtitle">Answer 5 quick questions and get a personalised plan recommendation.</p>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress" style="width: 0%"></div>
    </div>

    <div id="quiz">
      <!-- Questions injected by JS -->
    </div>

    <div class="result" id="result">
      <div id="planCard"></div>
      <button class="btn btn-ghost retake-btn" onclick="retake()">↩ Retake Quiz</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        text: "How do you primarily use AI assistants?",
        options: [
          { label: "Occasional personal tasks — writing, research, quick questions", scores: { free: 3, pro: 1 } },
          { label: "Daily work tasks — drafting, summarising, problem-solving", scores: { pro: 3, team: 1 } },
          { label: "Building products or integrating AI into software", scores: { api: 4 } }
        ]
      },
      {
        text: "How many people need access to Claude at your organisation?",
        options: [
          { label: "Just me", scores: { free: 2, pro: 2 } },
          { label: "A small team (2–25 people)", scores: { team: 4 } },
          { label: "Many users or automated systems at scale", scores: { api: 4 } }
        ]
      },
      {
        text: "How often do you hit usage limits on free AI tools?",
        options: [
          { label: "Rarely — I use it lightly", scores: { free: 4 } },
          { label: "Sometimes — it's frustrating but manageable", scores: { pro: 3 } },
          { label: "All the time — limits block my workflow", scores: { pro: 2, team: 2 } }
        ]
      },
      {
        text: "Do you need to use the most powerful / latest AI models?",
        options: [
          { label: "No — good enough answers are fine for me", scores: { free: 3 } },
          { label: "Yes — I want priority access to the best model", scores: { pro: 3, team: 1 } },
          { label: "Yes, and I need to choose models programmatically", scores: { api: 4 } }
        ]
      },
      {
        text: "How important is centralised billing and admin controls to you?",
        options: [
          { label: "Not important — I handle my own account", scores: { free: 2, pro: 2 } },
          { label: "Important — my team needs shared billing and permissions", scores: { team: 4 } },
          { label: "Critical — I need API-level control and usage tracking", scores: { api: 3, team: 1 } }
        ]
      }
    ];

    const plans = {
      free: {
        cls: 'free',
        name: 'Claude Free',
        reason: 'Based on your answers, the free tier gives you everything you need. You use AI occasionally, don\'t hit limits often, and don\'t need advanced model access. Start free and upgrade any time.',
        features: ['Access to Claude on claude.ai', 'Good for light personal use', 'No credit card needed', 'Upgrade any time']
      },
      pro: {
        cls: 'pro',
        name: 'Claude Pro',
        reason: 'You use Claude regularly for meaningful work and want priority access to the most capable models without hitting limits. Claude Pro gives you 5× more usage and priority access to Claude\'s most powerful model.',
        features: ['5× more usage than Free', 'Priority access to Claude 3.5 Sonnet & Opus', 'Early access to new features', 'Create and use Projects']
      },
      team: {
        cls: 'team',
        name: 'Claude Team',
        reason: 'You need multiple people working with Claude under a shared plan. Claude Team gives your whole organisation priority access, shared billing, and collaboration features — all in one place.',
        features: ['Everything in Pro for your whole team', 'Centralised billing and admin panel', 'Higher usage limits per person', 'Shared Projects and context']
      },
      api: {
        cls: 'api',
        name: 'Claude API',
        reason: 'You\'re building with Claude — whether that\'s automating workflows, building a product, or running Claude at scale. The API gives you programmatic control, model selection, and pay-per-token pricing.',
        features: ['Access all Claude models via REST API', 'Pay only for tokens you use', 'Fine-grained model and parameter control', 'Build integrations, agents, and products']
      }
    };

    let current = 0;
    const answers = new Array(questions.length).fill(null);

    function renderQuiz() {
      const container = document.getElementById('quiz');
      container.innerHTML = questions.map((q, i) => `
        <div class="question-block${i === current ? ' active' : ''}" id="q${i}">
          <div class="q-number">Question ${i + 1} of ${questions.length}</div>
          <div class="q-text">${q.text}</div>
          <div class="options">
            ${q.options.map((opt, j) => `
              <div class="option${answers[i] === j ? ' selected' : ''}"
                   onclick="selectAnswer(${i}, ${j})" role="button" tabindex="0">
                <div class="dot"></div>
                ${opt.label}
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.option').forEach(el => {
        el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') el.click(); });
      });

      renderNav();
      updateProgress();
    }

    function renderNav() {
      const existing = document.getElementById('nav-row');
      if (existing) existing.remove();
      const row = document.createElement('div');
      row.className = 'nav-row';
      row.id = 'nav-row';
      row.innerHTML = `
        ${current > 0
          ? `<button class="btn btn-ghost" onclick="goBack()">← Back</button>`
          : `<div></div>`}
        <button class="btn btn-primary" id="nextBtn"
          onclick="goNext()" ${answers[current] === null ? 'disabled' : ''}>
          ${current === questions.length - 1 ? 'See My Result →' : 'Next →'}
        </button>
      `;
      document.getElementById('quiz').appendChild(row);
    }

    function updateProgress() {
      const pct = (current / questions.length) * 100;
      document.getElementById('progress').style.width = pct + '%';
    }

    function selectAnswer(qIdx, optIdx) {
      answers[qIdx] = optIdx;
      document.querySelectorAll(`#q${qIdx} .option`).forEach((el, i) => {
        el.classList.toggle('selected', i === optIdx);
      });
      document.getElementById('nextBtn').disabled = false;
    }

    function goNext() {
      if (answers[current] === null) return;
      if (current < questions.length - 1) {
        current++;
        renderQuiz();
        document.querySelectorAll('.question-block').forEach((el, i) => {
          el.classList.toggle('active', i === current);
        });
      } else {
        showResult();
      }
    }

    function goBack() {
      if (current > 0) {
        current--;
        renderQuiz();
        document.querySelectorAll('.question-block').forEach((el, i) => {
          el.classList.toggle('active', i === current);
        });
      }
    }

    function showResult() {
      const scores = { free: 0, pro: 0, team: 0, api: 0 };
      questions.forEach((q, i) => {
        const chosen = q.options[answers[i]];
        if (chosen && chosen.scores) {
          Object.entries(chosen.scores).forEach(([plan, pts]) => { scores[plan] += pts; });
        }
      });

      const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
      const plan = plans[winner];

      document.getElementById('quiz').style.display = 'none';
      const existingNav = document.getElementById('nav-row');
      if (existingNav) existingNav.remove();

      document.getElementById('progress').style.width = '100%';

      document.getElementById('planCard').innerHTML = `
        <div class="plan-card ${plan.cls}">
          <div class="plan-label">Recommended Plan</div>
          <div class="plan-name">${plan.name}</div>
          <div class="plan-reason">${plan.reason}</div>
          <ul class="plan-features">
            ${plan.features.map(f => `<li>${f}</li>`).join('')}
          </ul>
        </div>
      `;
      document.getElementById('result').classList.add('visible');
    }

    function retake() {
      current = 0;
      answers.fill(null);
      document.getElementById('quiz').style.display = '';
      document.getElementById('result').classList.remove('visible');
      renderQuiz();
    }

    renderQuiz();
  </script>
</body>
</html>
